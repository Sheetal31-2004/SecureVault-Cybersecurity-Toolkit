{% extends "layout.html" %}
{% block content %}

<h2>🔍 Network Vulnerability Scan</h2>

<form method="POST">

    <div class="mb-3">
        <input type="text"
               name="target"
               class="form-control"
               placeholder="Enter IP Address or Domain"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">Scan Profile</label>

        <select name="scan_type" class="form-control">
            <option value="quick">⚡ Quick Scan</option>
            <option value="full">🔍 Full Scan</option>
            <option value="web">🌐 Web Application Scan</option>
        </select>
    </div>

    <div class="d-flex gap-2 mt-3">

    <button type="submit" class="btn btn-warning">
        🚀 Start Scan
    </button>

    <a href="/history" class="btn btn-info">
        📜 Scan History
    </a>

    </div>

</form>

{% if scan_result %}

<div class="mt-4">

    <h5>📊 Scan Results</h5>

    <div class="card bg-dark text-light p-3">
        <pre>{{ scan_result }}</pre>
    </div>

<div class="mt-3">

    <!-- View Report -->
    <form method="POST"
          action="/report"
          target="_blank"
          style="display:inline;">

        <input type="hidden"
               name="report_target"
               value="{{ target }}">

        <input type="hidden"
               name="scan_type"
               value="{{ request.form.get('scan_type','web') }}">

        <input type="hidden"
            name="action"
            value="view">

        <button class="btn btn-info">
            👁 View Report
        </button>

    </form>

    <!-- Download Report -->
    <form method="POST"
          action="/report"
          style="display:inline;">

        <input type="hidden"
               name="report_target"
               value="{{ target }}">

        <input type="hidden"
               name="scan_type"
               value="{{ request.form.get('scan_type','web') }}">
        
        <input type="hidden"
                name="action"
                value="download">

        <button class="btn btn-success ms-2">
            📥 Download Report
        </button>

    </form>

</div>

</div>

{% endif %}

{% endblock %}
