<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SecureVault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.service-card{

    height:300px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:20px;

    position:relative;

    overflow:hidden;

    cursor:pointer;

    transition:.5s;

    backdrop-filter:blur(20px);

    perspective:1000px;
}
.service-card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.8s;
    transform-style:preserve-3d;
}

.service-card:hover .service-card-inner{
    transform:rotateY(180deg);
}

.service-front,
.service-back{

    position:absolute;

    width:100%;
    height:100%;

    background: #0A0A0A;
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;

    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;

}

.service-front{

    display:flex;
    justify-content:center;
    align-items:center;

}

.service-back{

    transform:rotateY(180deg);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:20px;

}

.service-img{
    width:220px;
    height:220px;
    object-fit:contain;
    border-radius:20px;
    transition:.5s;
}

.service-back h3{
    margin-bottom:15px;
    font-weight:700;
}

.service-back p{
    color:#ccc;
    margin-bottom:15px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

    background: url("{{ url_for('static', filename='css/images/login_bg.png') }}") no-repeat center center fixed;

    background-size: cover;

    color: white;

    overflow-x: hidden;

}

/* Sidebar */

.sidebar{

position:fixed;

top:0;

left:0;

width:290px;

height:100vh;

background:rgba(20,25,60,.95);

backdrop-filter:blur(20px);

padding:25px;

border-right:1px solid rgba(255,255,255,.1);

overflow-y:auto;

scrollbar-width:none;

}

.sidebar::-webkit-scrollbar{

display:none;

}

.logo{

    text-align:center;

    margin-bottom:30px;

}

.logo-img{

    width:115px;

    height:115px;

    border-radius:50%;

    object-fit:cover;

    display:block;

    margin:0 auto 15px auto;

    transition:.3s;

}

.logo-img:hover{

    transform:scale(1.05);

}

.logo-text{

    font-size:24px;

    font-weight:700;

    color:#fff;

}

.logo-sub{

    font-size:10px;

    color:#bbb;

    letter-spacing:3px;

    margin-top:5px;

}

.menu{

margin-top:20px;

}

.menu a{

display:flex;

align-items:center;

gap:14px;

text-decoration:none;

padding:16px 18px;

margin-bottom:12px;

border-radius:12px;

color:#d8d8d8;

font-size:17px;

font-weight:500;

transition:.3s;

}

.menu a i{

width:24px;

font-size:20px;

text-align:center;

}

.menu a:hover{

background:#7d5fff;

color:white;

transform:translateX(6px);

box-shadow:0 0 15px rgba(125,95,255,.45);

}

.menu a.active{

background:#7d5fff;

color:white;

font-weight:600;

}

/* Main */

.main{

margin-left:300px;

padding:30px;

}

/* Topbar */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.heading h2{

font-weight:700;

}

.heading p{

color:#aaa;

margin:0;

}

.profile{

background:#242d63;

padding:10px 18px;

border-radius:12px;

}

/* Main Content */

.content{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

padding:30px;

border-radius:20px;

}

/* Cards */

.cardbox{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:25px;

transition:.35s;

height:100%;

}

.cardbox:hover{

transform:translateY(-8px);

box-shadow:0px 20px 40px rgba(125,95,255,.3);

}

.btn{

border-radius:10px;

}

/* Table */

.table{

color:white;

}

/* Responsive */

@media(max-width:900px){

.sidebar{

position:relative;

width:100%;

height:auto;

}

.main{

margin-left:0;

}

.topbar{

flex-direction:column;

align-items:flex-start;

gap:15px;

}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

    <img src="/static/css/images/logo.png"
         alt="SecureVault Logo"
         class="logo-img">

    <div class="logo-text">
        SecureVault
    </div>

    <div class="logo-sub">
PROTECT • DETECT • DEFEND
</div>

<div style="font-size:11px;
color:#7d5fff;
margin-top:8px;">

Cyber Security Management Platform

</div>
</div>
<div class="menu">

<a href="/">
<i class="bi bi-house-door"></i>
Dashboard
</a>

<a href="/scan">
<i class="bi bi-router"></i>
Network Scanner
</a>

<a href="/file-scan">
<i class="bi bi-folder2-open"></i>
File Scanner
</a>

<a href="{{ url_for('encryption_dashboard') }}">
    <i class="bi bi-shield-lock"></i>
    Encryption
</a>

<a href="/decrypt">
<i class="bi bi-shield-check"></i>
Decryption
</a>

<a href="{{ url_for('reports_dashboard') }}">
<i class="bi bi-bar-chart-line"></i>
Reports
</a>

<a href="/logout">
<i class="bi bi-door-open"></i>
Logout
</a>

</div>
</div>

<!-- Main -->

<div class="main">

<div class="topbar">

    <div class="heading">

        <h2>SecureVault</h2>

        <p>Cyber Security Management Platform</p>

    </div>

    <div class="profile">

        <i class="bi bi-person-circle"></i>

        Welcome {{ session.get('user', 'User') }}

    </div>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

</div>

</body>

</html>
