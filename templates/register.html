<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecureVault Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

.register-box{

width:420px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.4);

color:white;

}

.logo{

font-size:50px;

text-align:center;

}

.title{

font-size:30px;

font-weight:bold;

text-align:center;

}

.subtitle{

text-align:center;

margin-bottom:25px;

color:#cbd5e1;

}

.form-control{

height:50px;

margin-bottom:15px;

}

.btn-register{

width:100%;

height:50px;

background:#22c55e;

border:none;

font-size:18px;

font-weight:bold;

}

.footer{

text-align:center;

margin-top:20px;

}

.footer a{

color:#22c55e;

text-decoration:none;

}

.error{

text-align:center;

margin-top:15px;

color:#ff6b6b;

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">
🔐
</div>

<div class="title">
SecureVault
</div>

<div class="subtitle">
Create Account
</div>

<form method="POST">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-register">

Register

</button>

</form>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<div class="footer">

Already have an account?

<a href="/login">

Login

</a>

</div>

</div>

</body>

</html>
