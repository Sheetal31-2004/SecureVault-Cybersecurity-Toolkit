<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    margin:0;
    padding:0;

    font-family:'Poppins',sans-serif;

    background:url("{{ url_for('static', filename='css/images/login_bg.png') }}");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    background-attachment:fixed;

    width:100vw;

    height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

}





.login-box{

    position:relative;

    z-index:100;

    width:430px;

    max-width:90%;

    background:rgba(8,15,35,.82);

    backdrop-filter:blur(20px);

    border:1px solid rgba(125,95,255,.25);

    padding:40px;

    border-radius:30px;

    box-shadow:
    0 0 40px rgba(125,95,255,.25),
    0 20px 80px rgba(0,0,0,.5);

    color:white;

}

.login-logo{

    text-align:center;

    margin-bottom:15px;

}

.login-logo-img{

    width:90px;

    height:90px;

    border-radius:50%;

    object-fit:cover;

    display:block;

    margin:auto;

    filter:
    drop-shadow(0 0 10px #7d5fff)
    drop-shadow(0 0 20px #7d5fff)
    drop-shadow(0 0 30px #8a2be2);

}

.login-logo-img:hover{

    transform:scale(1.05);

    transition:.3s;

}

.title{

    text-align:center;

    font-size:32px;

    font-weight:bold;

    margin-bottom:5px;
}

.subtitle{

    text-align:center;

    color:#cbd5e1;

    margin-bottom:30px;
}

.form-control{

    height:55px;

    margin-bottom:15px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    color:white;

}

.form-control::placeholder{

    color:#cbd5e1;

}

.form-control:focus{

    background:rgba(255,255,255,.12);

    color:white;

    border-color:#7d5fff;

    box-shadow:0 0 15px rgba(125,95,255,.4);

}

.btn-login{

    width:100%;

    height:55px;

    background:linear-gradient(90deg,#6d5dfc,#a020f0);

    border:none;

    font-size:18px;

    font-weight:700;

    border-radius:15px;

    color:white;

    transition:.3s;

}

.btn-login:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 20px #7d5fff,
    0 0 40px #7d5fff;

}

.error{

    text-align:center;

    margin-top:15px;

    color:#ff6b6b;
}

.footer{

    text-align:center;

    margin-top:20px;

    color:#cbd5e1;
}

.footer a{

    color:#22c55e;

    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="login-logo">

    <img src="{{ url_for('static', filename='css/images/logo.png') }}"
         alt="SecureVault Logo"
         class="login-logo-img">

</div>

<div class="title">

SecureVault

</div>

<div class="subtitle">

Protect • Detect • Defend

</div>

<form method="POST" action="/login">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-login">
Login
</button>

</form>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<div class="footer">

Don't have an account?

<a href="/register">
Register
</a>

</div>

</div>


</body>
</html>
